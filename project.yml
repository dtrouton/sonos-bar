name: SonoBar
options:
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

packages:
  SonoBarKit:
    path: SonoBarKit

targets:
  SonoBar:
    type: application
    platform: macOS
    sources:
      - path: SonoBar
        excludes:
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sonobar.app
        INFOPLIST_FILE: SonoBar/Info.plist
        CODE_SIGN_ENTITLEMENTS: SonoBar/SonoBar.entitlements
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_APP_SANDBOX: "NO"
        CODE_SIGN_IDENTITY: "-"
        GENERATE_INFOPLIST_FILE: "NO"
    dependencies:
      - package: SonoBarKit
